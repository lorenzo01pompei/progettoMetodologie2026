plugins {
    id 'java'
    id 'application'
}

group = 'it.unicam.cs.mpgc.rpg125936'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

// Configurazione per far funzionare ./gradlew run
application {
    mainClass = 'it.unicam.cs.mpgc.rpg125936.core.App'
}